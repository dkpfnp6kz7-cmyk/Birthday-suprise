<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday</title>
<style>
body{margin:0;background:#ffb6c1;overflow:hidden;font-family:Arial;text-align:center}
.heart{position:fixed;top:-20px;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh);opacity:0}}
#c,#m,#b{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh}
#m,#b{display:none}button{padding:12px 20px;border:none;border-radius:20px}
img{max-width:90%%;max-height:70vh}
</style></head><body>
<div id="c"><h1 id="n">5</h1></div>
<div id="m"><h1>🎉 Happy Birthday ❤️</h1><button onclick="openBook()">Open Gift 📖</button></div>
<div id="b"><img id="img" src="https://picsum.photos/400/600"><p id="t">Replace with your photo.</p></div>
<script>
for(let i=0;i<40;i++){let d=document.createElement('div');d.className='heart';d.innerHTML='❤️';d.style.left=Math.random()*100+'vw';d.style.animationDuration=(3+Math.random()*4)+'s';d.style.animationDelay=Math.random()*5+'s';document.body.appendChild(d);}
let c=5;let x=setInterval(()=>{n.innerText=--c;if(c==0){clearInterval(x);cdiv=document.getElementById('c').style.display='none';document.getElementById('m').style.display='flex';}},1000);
function openBook(){document.getElementById('m').style.display='none';document.getElementById('b').style.display='flex';}
</script></body></html>
